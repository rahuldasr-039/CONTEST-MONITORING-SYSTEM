{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5 col-lg-4">
        
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0 fw-bold"><i class="fa-solid fa-right-to-bracket me-2"></i>Login</h4>
            </div>
            
            <div class="card-body p-4 p-md-5">
                
                <p class="text-center text-muted mb-4">
                    Enter your credentials to access the Academic Monitor.
                </p>

                <form action="{{ url_for('login') }}" method="POST">
                    
                    <div class="mb-3">
                        <label for="email" class="form-label fw-bold text-secondary">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="fa-solid fa-envelope text-muted"></i></span>
                            <input type="email" class="form-control" id="email" name="email" placeholder="name@college.edu" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label fw-bold text-secondary">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="fa-solid fa-lock text-muted"></i></span>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary py-2 fw-bold">
                            Sign In
                        </button>
                    </div>

                </form>

                <div class="mt-4 text-center border-top pt-3">
                    <p class="small text-muted mb-1">Don't have an account yet?</p>
                    <a href="{{ url_for('register') }}" class="text-decoration-none fw-bold">Register New Account</a>
                </div>

            </div>
        </div>

        <div class="text-center mt-3 text-muted small">
            &copy; 2026 Academic Performance System
        </div>

    </div>
</div>
{% endblock %}
